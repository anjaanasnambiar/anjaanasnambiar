<text x="250" y="72" font-family="'Segoe UI',system-ui,sans-serif" font-weight="700" font-size="32" fill="#e8e8f0" opacity="0"><animate attributeName="opacity" from="0" to="1" dur=".8s" begin=".5s" fill="freeze"/>Anjana S Nambiar</text>
